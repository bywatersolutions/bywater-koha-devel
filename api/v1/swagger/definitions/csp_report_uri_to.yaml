---
type:
  - array
  - object
description: |
  A Content-Security-Policy violation report as sent by browsers.
  See https://www.w3.org/TR/CSP3/#violation-reports for specification.
properties:
  csp-report:
    $ref: "csp_report.yaml"
  age:
    type: integer
    minimum: 0
    maximum: 9999999999
  body:
    $ref: "csp_report_body.yaml"
  user_agent:
    type: string
    maxLength: 300
  url:
    type: string
    maxLength: 200
  type:
    type: string
    enum:
      - "csp-violation"
additionalProperties: true
