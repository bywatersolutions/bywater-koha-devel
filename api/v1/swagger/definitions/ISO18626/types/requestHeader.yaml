---
type: object
properties:
  supplyingAgencyId:
    $ref: '../types/agencyId.yaml'
    description: Identification of supplying library. Shall be provided except for RequestSubType = PatronRequest and TransferRequest
  requestingAgencyId:
    $ref: '../types/agencyId.yaml'
    description: Identification of requesting library
  consortialId:
    $ref: '../types/agencyId.yaml'
    description: Identification of the consortium with which the request is associated
  multipleItemRequestId:
    type:
      - string
      - "null"
    description: Identification of MultipleItemRequest
  timestamp:
    type: string
    format: date-time
    description: Date and time of the transaction
  requestingAgencyRequestId:
    type: string
    description: Requesting librarys request identification or number
  requestingAgencyAuthentication:
    $ref: '../requestHeader/requestingAgencyAuthentication.yaml'
    description: Authentication in supplying library system of the requesting library
required:
  - requestingAgencyId
  - timestamp
  - requestingAgencyRequestId
additionalProperties: false
