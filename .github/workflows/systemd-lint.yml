name: systemd unit lint

# Fast static checks for the systemd unit files and debian/control consistency, runs on every push touching the packaging surface.

on:
  push:
    paths:
      - 'debian/systemd/**'
      - 'debian/koha-systemd.*'
      - 'debian/koha-sysv.*'
      - 'debian/control'
      - 'debian/control.in'
      - 'debian/scripts/koha-generate-env'
      - 'debian/scripts/koha-functions.sh'
      - '.github/workflows/systemd-lint.yml'
  pull_request:
    paths:
      - 'debian/systemd/**'
      - 'debian/koha-systemd.*'
      - 'debian/koha-sysv.*'
      - 'debian/control'
      - 'debian/control.in'
      - 'debian/scripts/koha-generate-env'
      - 'debian/scripts/koha-functions.sh'
      - '.github/workflows/systemd-lint.yml'

jobs:
  unit-syntax:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install systemd tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              systemd lintian shellcheck

      - name: Stub Koha executables for systemd-analyze
        run: |
          set -euo pipefail
          # systemd-analyze verify checks that ExecStart paths exist on disk, so stub the Koha binaries the runner doesn't have.
          for path in \
              /usr/sbin/koha-create-dirs \
              /usr/sbin/koha-generate-env \
              /usr/bin/starman \
              /usr/bin/zebrasrv \
              /usr/share/koha/bin/z3950_responder.pl \
              /usr/share/koha/bin/migration_tools/rebuild_zebra.pl \
              /usr/share/koha/bin/workers/background_jobs_worker.pl \
              /usr/share/koha/bin/workers/es_indexer_daemon.pl \
              /usr/share/koha/lib/C4/SIP/SIPServer.pm \
          ; do
              sudo install -D -m 0755 /dev/null "$path"
          done

      - name: systemd-analyze verify (per-unit syntax + dep check)
        run: |
          set -euo pipefail
          # Substitute a fake instance name into foo@.service templates so %i resolves during verify.
          fail=0
          tmp=$(mktemp -d)
          for u in debian/systemd/*.service debian/systemd/*.target; do
              base=$(basename "$u")
              dst="$tmp/${base/@/@bug40901lint}"
              cp "$u" "$dst"
          done
          # --man=no skips Documentation= man-page resolution since the man pages aren't installed on the runner.
          if ! sudo systemd-analyze verify --man=no "$tmp"/*.{service,target}; then
              fail=1
          fi
          rm -rf "$tmp"
          exit $fail

      - name: shellcheck on shipped shell helpers
        run: |
          # --severity=warning skips info-level findings like SC1091 (unfollowable source) while still catching real bugs.
          shellcheck --severity=warning -s sh   debian/scripts/koha-generate-env
          shellcheck --severity=warning -s bash debian/systemd/koha-systemd-ctl
          # Skip koha-functions.sh — it's /bin/sh but uses extensions shellcheck flags that bash and dash both accept.

      - name: koha-systemd-ctl --help should exit cleanly
        run: |
          # Smoke test: the --help path should run without errors.
          bash debian/systemd/koha-systemd-ctl 2>&1 | grep -qi usage

      - name: debian/control vs control.in consistency
        run: |
          # Compare control vs control.in, ignoring the __AUTODEPENDS__ substitution that needs the Perl tree to compute.
          if [ ! -f debian/control.in ]; then
              echo "No debian/control.in — skipping consistency check"
              exit 0
          fi
          # Strip generator-substituted lines so we only compare the hand-maintained portions.
          strip() {
              # Drop blank lines and replace Depends:/Build-Depends: blocks with a single placeholder.
              awk '
                  /^(Build-)?Depends:/ {
                      sub(/:.*/, ":__PLACEHOLDER__")
                      depblock=1; print; next
                  }
                  /^[[:space:]]/ && depblock { next }
                  { depblock=0; print }
              ' "$1" | grep -vE '^Generated by'
          }
          diff -u <(strip debian/control.in) <(strip debian/control) \
              > /tmp/control-diff || true
          if [ -s /tmp/control-diff ]; then
              echo "::warning::debian/control and debian/control.in have differences:"
              cat /tmp/control-diff
              # Warn-only — the AUTODEPENDS substitution is hard to fully replicate without the Perl tree.
          fi
